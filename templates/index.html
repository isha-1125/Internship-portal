<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to Internship Portal</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color:#e0e0ff;
    text-align:center;
}

/* Container */
.container{
    padding:40px;
    border-radius:20px;
    background: rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    box-shadow:0 0 30px rgba(0,0,0,0.6);
}

/* Headings */
h1{
    font-size:2.2rem;
    margin-bottom:15px;
}

p{
    font-size:16px;
    color:#cfcfff;
    margin-bottom:25px;
}

/* Buttons */
.btn{
    display:inline-block;
    padding:10px 20px;
    margin:8px;
    border-radius:6px;
    text-decoration:none;
    font-weight:bold;
    background:#6d28d9;
    color:white;
    transition:0.3s;
    box-shadow:0 0 5px rgba(109,40,217,0.4);
}

.btn:hover{
    background:#5b21b6;
    box-shadow:0 0 12px rgba(109,40,217,0.6);
}

/* Glowing effect like login/register page */
.btn:focus, .btn:active{
    outline:none;
    box-shadow:0 0 15px rgba(168,85,247,0.8);
}
</style>
</head>

<body>
<div class="container">
    <h1>Welcome to Internship Portal</h1>
    <p>Your gateway to exciting tech internship opportunities!</p>

    <a href="{% url 'home' %}" class="btn">Home</a>
    <a href="{% url 'login' %}" class="btn">Login</a> 
    <a href="{% url 'register' %}" class="btn">Register</a>
</div>
</body>
</html>
