{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
}

/* Navbar */
header{
position:fixed;
top:0;
left:0;
width:100%;
padding:15px 100px;
background: rgba(15,12,41,0.9);
backdrop-filter:blur(10px);
display:flex;
justify-content:space-between;
align-items:center;
z-index:99;
}

.logo a{
color:#e0e0ff;
font-size:1.5em;
font-weight:bold;
text-decoration:none;
}

nav a{
color:#cfcfff;
text-decoration:none;
margin-left:40px;
transition:0.3s;
}

nav a:hover{
color:#a855f7;
}

/* Card */
.wrapper{
width:420px;
padding:35px;
background: rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.15);
border-radius:20px;
backdrop-filter:blur(15px);
box-shadow:0 0 40px rgba(0,0,0,0.7);
margin-top:90px;
}

h2{
text-align:center;
color:#e0e0ff;
margin-bottom:20px;
}

/* Inputs */
.input-box{
margin:20px 0;
}

.input-box label{
color:#cfcfff;
font-size:0.9em;
}

input,select{
width:100%;
padding:10px;
background:transparent;
border:none;
border-bottom:2px solid #aaa;
color:white;
outline:none;
}

input:focus, select:focus{
border-bottom:2px solid #a855f7;
}

/* Dropdown */
select{
background:#1a1a2e;
color:white;
border-radius:6px;
padding:10px;
}

/* Calendar */
input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(1);
    cursor: pointer;
}

input[type="date"] {
    color-scheme: dark;
}

/* Skills */
.skills-box{
border:2px solid #aaa;
padding:10px;
border-radius:6px;
display:flex;
flex-wrap:wrap;
gap:5px;
cursor:pointer;
background: rgba(255,255,255,0.05);
}

.skills-box:hover{
border-color:#a855f7;
}

.skill-tag{
background:#6d28d9;
padding:5px 10px;
border-radius:20px;
color:white;
display:flex;
align-items:center;
gap:5px;
font-size:12px;
}

.remove{
cursor:pointer;
font-weight:bold;
}

.skills-dropdown{
display:none;
background:#1e1e2f;
border:2px solid #a855f7;
max-height:150px;
overflow-y:auto;
margin-top:5px;
border-radius:6px;
}

.skills-dropdown div{
padding:8px;
color:white;
cursor:pointer;
}

.skills-dropdown div:hover{
background:#a855f7;
}

/* Button */
.btn{
width:100%;
height:45px;
background:#6d28d9;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
margin-top:15px;
}

.btn:hover{
background:#5b21b6;
}
</style>
</head>

<body>

<header>
<div class="logo"><a href="{% url 'home' %}">InternAcharya</a></div>
<nav>
<a href="{% url 'home' %}">Home</a>
<a href="{% url 'logout' %}">Logout</a>
</nav>
</header>

<div class="wrapper">
<h2>Profile Information</h2>

<form method="post">
{% csrf_token %}

<div class="input-box">
<label>Full Name</label>
<input type="text" name="full_name"
pattern="[A-Za-z]{2,} [A-Za-z]{2,}"
value="{{ profile.full_name|default:'' }}" required>
</div>

<div class="input-box">
<label>Contact</label>
<input type="text" name="contact_number"
pattern="[0-9]{10}" maxlength="10"
value="{{ profile.contact_number|default:'' }}">
</div>

<div class="input-box">
<label>Gender</label>
<select name="gender" required>
<option value="">Select</option>
<option value="Male" {% if profile.gender == "Male" %}selected{% endif %}>Male</option>
<option value="Female" {% if profile.gender == "Female" %}selected{% endif %}>Female</option>
<option value="Other" {% if profile.gender == "Other" %}selected{% endif %}>Other</option>
</select>
</div>

<div class="input-box">
<label>Date of Birth</label>
<input type="date" id="dob" name="date_of_birth"
value="{{ profile.date_of_birth|date:'Y-m-d' }}"
max="{{ now|date:'Y-m-d' }}" required>
</div>

<div class="input-box">
<label>Age</label>
<input type="number" id="age" name="age" readonly
value="{{ profile.age|default:'' }}">
</div>

<div class="input-box">
<label>Qualification</label>
<select name="qualifications" required>
<option value="">Select</option>
<option>B.Tech</option>
<option>M.Tech</option>
<option>BCA</option>
<option>MCA</option>
<option>BSc</option>
<option>MSc</option>
</select>
</div>

<!-- Skills -->
<div class="input-box">
<label>Skills</label>

<div class="skills-box" onclick="toggleDropdown()" id="skillsBox"></div>

<div class="skills-dropdown" id="dropdown">
<div onclick="selectSkill('C++')">C++</div>
<div onclick="selectSkill('Java')">Java</div>
<div onclick="selectSkill('Python')">Python</div>
<div onclick="selectSkill('JavaScript')">JavaScript</div>
<div onclick="selectSkill('HTML')">HTML</div>
<div onclick="selectSkill('CSS')">CSS</div>
<div onclick="selectSkill('React')">React</div>
<div onclick="selectSkill('Node.js')">Node.js</div>
<div onclick="selectSkill('MongoDB')">MongoDB</div>
<div onclick="selectSkill('SQL')">SQL</div>
<div onclick="selectSkill('Git')">Git</div>
<div onclick="selectSkill('GitHub')">GitHub</div>
<div onclick="selectSkill('REST API')">REST API</div>
<div onclick="selectSkill('Postman')">Postman</div>
<div onclick="selectSkill('Other')">Other</div>
</div>

<input type="hidden" name="skills" id="skillsInput">
</div>

<div class="input-box">
<label>Interest</label>
<select name="area_of_interest" required>
<option value="">Select</option>
<option>Software Developer</option>
<option>Frontend Developer</option>
<option>Backend Developer</option>
<option>Full Stack Developer</option>
<option>Data Analyst</option>
<option>Machine Learning</option>
<option>AI Engineer</option>
</select>
</div>

<button class="btn">Save</button>
</form>
</div>

<script>

let skills = [];

/* Toggle */
function toggleDropdown(){
let d = document.getElementById("dropdown");
d.style.display = d.style.display === "block" ? "none" : "block";
}

/* FIXED FUNCTION */
function selectSkill(skill){
if(!skills.includes(skill)){
skills.push(skill);

let tag = document.createElement("span");
tag.className="skill-tag";
tag.innerHTML = skill + ' <span class="remove" onclick="removeSkill(this, \''+skill+'\')">×</span>';

document.getElementById("skillsBox").appendChild(tag);
document.getElementById("skillsInput").value = skills.join(",");
}

document.getElementById("dropdown").style.display="none";
}

function removeSkill(el, skill){
skills = skills.filter(s => s !== skill);
el.parentElement.remove();
document.getElementById("skillsInput").value = skills.join(",");
}

/* Age auto */
document.getElementById("dob").addEventListener("change", function() {
const dob = new Date(this.value);
const today = new Date();

let age = today.getFullYear() - dob.getFullYear();
const m = today.getMonth() - dob.getMonth();

if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) age--;

document.getElementById("age").value = age;
});

/* Close dropdown */
document.addEventListener("click", function(e){
if(!e.target.closest(".input-box")){
document.getElementById("dropdown").style.display="none";
}
});

</script>

</body>
</html>
