{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
 <style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Poppins',sans-serif;
    }

    body{
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
        background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    }

    .wrapper{
        width:400px;
        padding:40px;
        border-radius:20px;
        backdrop-filter:blur(15px);
        background: rgba(255,255,255,0.05);
        border:1px solid rgba(255,255,255,0.15);
        box-shadow:0 0 40px rgba(0,0,0,0.7);
    }

    h2{
        text-align:center;
        margin-bottom:25px;
        color:#e0e0ff;
        letter-spacing:1px;
    }

    .input-box{
        margin-bottom:25px;
    }

    .input-box label{
        font-size:14px;
        font-weight:600;
        color:#cfcfff;
    }

    .input-box input{
        width:100%;
        padding:10px;
        background:transparent;
        border:none;
        border-bottom:2px solid #aaa;
        color:#ffffff;
        font-size:15px;
        outline:none;
        margin-top:5px;
        transition:0.3s;
    }

    .input-box input:focus{
        border-bottom:2px solid #a855f7;
    }

    .btn{
    width:100%;
    padding:10px;
    background:#6d28d9;
    color:#fff;
    border:none;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    background:#5b21b6;
    box-shadow:0 0 12px rgba(109, 40, 217, 0.6);
}
</style>
</head>
<body>

<div class="wrapper">
    <h2>Forgot Password</h2>

    <form method="post">
        {% csrf_token %}
        <div class="input-box">
            <label>Email Address</label>
            {{ form.email }}
        </div>

        <button type="submit" class="btn">Send Reset Link</button>
    </form>
</div>

</body>
</html>
