{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Password Reset Successful</title>
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
}

.wrapper{
width:400px;
padding:40px;
border-radius:20px;
backdrop-filter:blur(15px);
background: rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.15);
box-shadow:0 0 40px rgba(0,0,0,0.7);
text-align:center;
}

.check{
width:80px;
height:80px;
border-radius:50%;
background:#6d28d9;
display:flex;
justify-content:center;
align-items:center;
margin:0 auto 20px;
font-size:40px;
color:white;
animation:pop 0.5s ease;
box-shadow:0 0 15px rgba(109,40,217,0.6);
}

@keyframes pop{
0%{transform:scale(0);}
100%{transform:scale(1);}
}

h2{
color:#e0e0ff;
margin-bottom:10px;
}

p{
color:#cfcfff;
font-size:14px;
margin-bottom:20px;
}

.btn{
display:inline-block;
padding:10px 20px;
background:#6d28d9;
color:white;
text-decoration:none;
border-radius:6px;
font-weight:bold;
transition:0.3s;
}

.btn:hover{
background:#5b21b6;
box-shadow:0 0 12px rgba(109,40,217,0.6);
}

</style>

</head>

<body>

<div class="wrapper">

<div class="check">✔</div>

<h2>Password Reset Successful</h2>

<p>Your password has been changed successfully.</p>

<a href="{% url 'login' %}" class="btn">Go to Login</a>

</div>

</body>
</html>
