{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internship Application</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    min-height:100vh;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
}

/* Navbar */
header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    padding:15px 100px;
    background: rgba(15,12,41,0.9);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:99;
}

.logo a{
    color:#e0e0ff;
    font-size:1.5em;
    font-weight:bold;
    text-decoration:none;
}

nav a{
    color:#cfcfff;
    text-decoration:none;
    margin-left:30px;
    font-weight:500;
    transition:0.3s;
}

nav a:hover{
    color:#a855f7;
}

/* Container / Card */
.container{
    width:600px;
    background: rgba(255,255,255,0.05);
    padding:40px;
    border-radius:20px;
    backdrop-filter:blur(15px);
    box-shadow:0 0 40px rgba(0,0,0,0.7);
    margin-top:120px;
    color:#fff;
}

/* Heading */
.container h2{
    text-align:center;
    font-size:2em;
    color:#e0e0ff;
    margin-bottom:25px;
}

.form-step{
    display:none;
}

.form-step.active{
    display:block;
}

.input-box{
    width:100%;
    margin:20px 0;
}

.input-box label{
    display:block;
    margin-bottom:5px;
    font-size:14px;
    font-weight:600;
    color:#cfcfff;
}

/* Inputs + Dropdown */
.input-box input,
.input-box select{
    width:100%;
    padding:10px;
    border:2px solid #555;
    border-radius:6px;
    background:#1a1a2e;
    outline:none;
    color:#fff;
    font-size:1em;
    transition:0.3s;

    appearance:none;
    -webkit-appearance:none;
    -moz-appearance:none;
    cursor:pointer;
}

.input-box input:focus,
.input-box select:focus{
    border-color:#a855f7;
    box-shadow:0 0 8px rgba(168,85,247,0.6);
}

.input-box select option{
    background:#1f1f2e;
    color:#fff;
}

/* Buttons */
button, .next-btn, .prev-btn{
    background:#6d28d9;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:6px;
    cursor:pointer;
    font-weight:500;
    margin:10px 5px 0 0;
    transition:0.3s;
}

button:hover, .next-btn:hover, .prev-btn:hover{
    background:#5b21b6;
    box-shadow:0 0 12px rgba(109,40,217,0.6);
}

/* Selected skills */
.selected-skills span{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:#6d28d9;
    color:white;
    padding:6px 12px;
    margin:5px;
    border-radius:20px;
    cursor:pointer;
    font-size:13px;
    transition:0.3s;
}

.selected-skills span:hover{
    background:#5b21b6;
    transform:scale(1.05);
}

/* Radio Group */
.radio-group{
    display:flex;
    gap:20px;
    margin-top:10px;
}

/* Progress Bar */
.progress-container{
    position:relative;
    margin-top:20px;
    display:flex;
    justify-content:space-between;
    width:80%;
    margin:auto;
}

.progress-line{
    position:absolute;
    top:50%;
    left:10%;
    width:0%;
    height:5px;
    background:#a855f7;
    z-index:-1;
    transition:width .4s;
}

.progress-circle{
    width:40px;
    height:40px;
    background:#eee;
    text-align:center;
    line-height:40px;
    border-radius:50%;
    font-weight:bold;
}

.progress-circle.active{
    background:#a855f7;
    color:white;
}

/* File names */
.file-name{
    font-size:13px;
    color:#73ff57;
    pointer-events:none;
}
</style>
</head>
<body>

<header>
<div class="logo"><a href="{% url 'home' %}">InternAcharya</a></div>
<nav>
<a href="{% url 'home' %}">Home</a>
<a href="{% url 'register' %}">Register/Login</a>
<a href="{% url 'list' %}">Internships</a>
<a href="{% url 'student_dashboard' %}">Profile</a>
</nav>
</header>

<div class="container">
<h2>Internship Application</h2>

<form id="applicationForm" action="{% url 'apply_internship' internship.id %}" method="POST" enctype="multipart/form-data">
{% csrf_token %}

<!-- STEP 1 -->
<div class="form-step active">
<h3>Step 1: Personal Details</h3>

<div class="input-box">
<label>Full Name</label>
<input type="text" name="full_name" pattern="[A-Za-z]{2,} [A-Za-z]{2,}" title="Enter First and Last Name" required>
</div>

<div class="input-box">
<label>Email Address</label>
<input type="email" name="email" required>
</div>

<div class="input-box">
<label>Phone Number</label>
<input type="tel" name="phone" pattern="[0-9]{10}" maxlength="10" title="Enter 10 digit phone number" required>
</div>

<div class="input-box">
    <label>Address</label>
    <input type="text" name="address" id="address"
           placeholder="Enter your full address"
           required>
</div>
<div class="input-box">
    <label>Pincode</label>
    <input type="text" name="pincode" 
           pattern="[0-9]{6}" 
           maxlength="6"
           title="Pincode must be exactly 6 digits"
           required>
</div>

<button type="button" class="next-btn">Next</button>
</div>

<!-- STEP 2 -->
<div class="form-step">
<h3>Step 2: Technical Details</h3>

<div class="input-box">
<label>Select Your Skills</label>

<select id="skillsDropdown">
  <option value="">Choose Skill</option>

  <!-- Programming Languages -->
  <option value="Python">Python</option>
  <option value="Java">Java</option>
  <option value="C++">C++</option>
  <option value="JavaScript">JavaScript</option>
  <option value="C">C</option>
  <option value="Go">Go</option>
  <option value="Rust">Rust</option>

  <!-- Web Development -->
  <option value="HTML">HTML</option>
  <option value="CSS">CSS</option>
  <option value="React">React</option>
  <option value="Next.js">Next.js</option>
  <option value="Node.js">Node.js</option>
  <option value="Express.js">Express.js</option>
  <option value="Django">Django</option>
  <option value="Flask">Flask</option>

  <!-- Databases -->
  <option value="MySQL">MySQL</option>
  <option value="PostgreSQL">PostgreSQL</option>
  <option value="MongoDB">MongoDB</option>
  <option value="SQLite">SQLite</option>

  <!-- Data Science / AI -->
  <option value="Machine Learning">Machine Learning</option>
  <option value="Deep Learning">Deep Learning</option>
  <option value="Data Analysis">Data Analysis</option>
  <option value="Pandas">Pandas</option>
  <option value="NumPy">NumPy</option>
  <option value="TensorFlow">TensorFlow</option>
  <option value="PyTorch">PyTorch</option>

  <!-- Tools -->
  <option value="Git">Git</option>
  <option value="GitHub">GitHub</option>
  <option value="Docker">Docker</option>
  <option value="Kubernetes">Kubernetes</option>
  <option value="Linux">Linux</option>

  <!-- Cloud -->
  <option value="AWS">AWS</option>
  <option value="Azure">Azure</option>
  <option value="Google Cloud">Google Cloud</option>
   <option value="Other">Other</option>

</select>
<div id="skillsBox" class="selected-skills"></div>
<input type="hidden" name="skills" id="skillsInput" required>
</div>

<div class="input-box">
<label>Preferred Technology</label>
<select id="techDropdown">
  <option value="">Choose Technology</option>
  <option value="Web">Frontend Development</option>
  <option value="Python">Backend Development</option>
  <option value="Web">Full Stack Development</option>
  <option value="AI">Artificial Intelligence</option>
  <option value="web">Software Development</option>
  <option value="DS">Data Science</option>
</select>
<div id="techBox" class="selected-skills"></div>
<input type="hidden" name="preferred_technology" id="techInput" required>
</div>

<div class="input-box">
<label>Work Experience (Years)</label>
<input type="number" name="experience" min="0" max="20" step="0.5" required>
</div>

<div class="input-box">
<label>Are you a Fresher?</label>
<div class="radio-group">
<label><input type="radio" name="freshers" value="Yes" required> Yes</label>
<label><input type="radio" name="freshers" value="No"> No</label>
</div>
</div>

<button type="button" class="prev-btn">Back</button>
<button type="button" class="next-btn">Next</button>
</div>

<!-- STEP 3 -->
<div class="form-step">
<h3>Step 3: Upload Documents</h3>

<div class="input-box">
<label>Select Internship Role</label>
<select name="internship_role" required>
  <option value="">Choose Role</option>
  <option value="Web">Frontend Developer</option>
  <option value="Python">Backend Developer</option>
  <option value="Web">Full Stack Developer</option>
  <option value="Python">Software Developer</option>
  <option value="DS">Data Scientist</option>
  <option value="AI">AI Engineer</option>
</select>
</div>

<div class="input-box">
<label>Upload Resume (PDF only)</label>
<input type="file" id="resume" name="resume" accept=".pdf" required>
<div id="resumeName" class="file-name"></div>
</div>

<div class="input-box">
<label>
Upload Certificates (Optional)<br>
<small style="color:#aaa;">
Accepted: Internship, Online Courses, Hackathons, Workshops, Achievements (PDF/JPG/PNG)
</small>
</label>
<input type="file" id="certificate" name="certificates" accept=".pdf,.jpg,.png">
<div id="certificateName" class="file-name"></div>
</div>

<button type="button" class="prev-btn">Back</button>
<button type="submit">Submit</button>
</div>

</form>

<div class="progress-container">
<div class="progress-line" id="progressLine"></div>
<div class="progress-circle active">1</div>
<div class="progress-circle">2</div>
<div class="progress-circle">3</div>
</div>

</div>

<script>
let currentStep=0;
const steps=document.querySelectorAll(".form-step");
const nextBtns=document.querySelectorAll(".next-btn");
const prevBtns=document.querySelectorAll(".prev-btn");
const circles=document.querySelectorAll(".progress-circle");
const progressLine=document.getElementById("progressLine");

function updateForm(){
    steps.forEach((step,i)=>step.classList.toggle("active",i===currentStep));
    circles.forEach((circle,i)=>circle.classList.toggle("active",i<=currentStep));
    progressLine.style.width=(currentStep*50)+"%";
}

// NEXT BUTTON VALIDATION (required only)
nextBtns.forEach(btn=>{
    btn.onclick = () => {
        const inputs = steps[currentStep].querySelectorAll("input[required], select[required]");
        for(let input of inputs){
            if(!input.checkValidity()){
                input.reportValidity();
                return;
            }
        }
        currentStep++;
        if(currentStep >= steps.length) currentStep = steps.length - 1;
        updateForm();
    };
});

prevBtns.forEach(btn=>{
    btn.onclick = () => {
        currentStep--;
        if(currentStep < 0) currentStep = 0;
        updateForm();
    };
});

updateForm();

/* Skills / Tech Selection */
let skills=[], tech=[];
const skillsDropdown=document.getElementById("skillsDropdown");
const skillsBox=document.getElementById("skillsBox");
const skillsInput=document.getElementById("skillsInput");
const techDropdown=document.getElementById("techDropdown");
const techBox=document.getElementById("techBox");
const techInput=document.getElementById("techInput");

skillsDropdown.onchange=function(){
    let val=this.value;
    if(val && !skills.includes(val)){
        skills.push(val); renderSkills();
    }
    this.value="";
};
function renderSkills(){
    skillsBox.innerHTML="";
    skills.forEach(skill=>{
        let tag=document.createElement("span");
        tag.innerHTML=skill+" ❌";
        tag.onclick=function(){ skills=skills.filter(s=>s!==skill); renderSkills(); };
        skillsBox.appendChild(tag);
    });
    skillsInput.value=skills.join(",");
}

techDropdown.onchange=function(){
    let val=this.value;
    if(val && !tech.includes(val)){
        tech.push(val); renderTech();
    }
    this.value="";
};
function renderTech(){
    techBox.innerHTML="";
    tech.forEach(t=>{
        let tag=document.createElement("span");
        tag.innerHTML=t+" ❌";
        tag.onclick=function(){ tech=tech.filter(x=>x!==t); renderTech(); };
        techBox.appendChild(tag);
    });
    techInput.value=tech.join(",");
}

/* File names */
document.getElementById("resume").onchange=function(){
    document.getElementById("resumeName").innerText=this.files[0].name;
};
document.getElementById("certificate").onchange=function(){
    document.getElementById("certificateName").innerText=this.files[0].name;
};
</script>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const addressInput = document.getElementById("address");
    
        addressInput.addEventListener("input", function () {
            let value = this.value.trim();
    
            if (value.length < 10) {
                this.setCustomValidity("Address must be at least 10 characters");
            } 
            else if (!/^[A-Za-z0-9\s,.\-#/]+$/.test(value)) {
                this.setCustomValidity("Invalid characters in address");
            } 
            else {
                this.setCustomValidity("");
            }
        });
    });
    </script>
</body>
</html>
