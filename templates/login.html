{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Portal</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color:#e0e0ff;
}

/* Navbar */
header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    padding:15px 100px;
    background: rgba(15,12,41,0.9);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:99;
}

.logo a{
    color:#e0e0ff;
    font-size:1.5em;
    font-weight:bold;
    text-decoration:none;
}

nav a{
    color:#cfcfff;
    text-decoration:none;
    margin-left:40px;
    font-weight:500;
    transition:0.3s;
}

nav a:hover{
    color:#a855f7;
}

/* Card */
.wrapper{
    position:relative;
    width:400px;
    padding:40px;
    background: rgba(255,255,255,0.05);
    border-radius:20px;
    backdrop-filter:blur(15px);
    box-shadow:0 0 40px rgba(0,0,0,0.7);
    margin-top:100px;
}

/* Heading */
.form-box h2{
    text-align:center;
    font-size:2em;
    color:#e0e0ff;
    margin-bottom:25px;
}

/* Inputs */
.input-box{
    position:relative;
    width:100%;
    margin:20px 0;
}

.input-box label{
    display:block;
    margin-bottom:5px;
    font-size:0.9em;
    color:#cfcfff;
}

/* Input fields - black theme like internship form */
.input-box input{
    width:100%;
    padding:12px;
    border:2px solid #555;
    border-radius:6px;
    background: #1a1a2e;  /* dark black */
    color:#fff;
    font-size:1em;
    outline:none;
    transition:0.3s;
}

.input-box input:focus{
    border-color:#a855f7;
    box-shadow:0 0 8px rgba(168,85,247,0.6);
}

/* Toggle password */
.toggle{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    font-size:0.8em;
    cursor:pointer;
    color:#a855f7;
    font-weight:600;
}

/* Button */
.btn{
    width:100%;
    padding:12px;
    background:#6d28d9;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:1em;
    color:white;
    font-weight:500;
    margin-top:10px;
    transition:0.3s;
}

.btn:hover{
    background:#5b21b6;
    box-shadow:0 0 12px rgba(109,40,217,0.6);
}

/* Links */
.forgot-link{
    text-align:right;
    margin-top:-10px;
}

.forgot-link a{
    color:#cfcfff;
    font-size:0.85em;
    text-decoration:none;
}

.forgot-link a:hover{
    color:#a855f7;
}

.login-register{
    text-align:center;
    margin-top:15px;
    font-size:0.9em;
}

.login-register a{
    color:#a855f7;
    font-weight:600;
    text-decoration:none;
}

.login-register a:hover{
    text-decoration:underline;
}

/* Messages */
.messages{
    margin-bottom:15px;
}

.message{
    padding:10px;
    border-radius:5px;
    text-align:center;
    font-weight:bold;
}

.message.success{
    background:rgba(34,197,94,0.2);
    color:#22c55e;
}

.message.error{
    background:rgba(239,68,68,0.2);
    color:#ef4444;
}
</style>
</head>

<body>

<header>
<div class="logo"><a href="{% url 'home' %}">InternAcharya</a></div>
<nav>
<a href="{% url 'home' %}">Home</a>
<a href="{% url 'login' %}">Register/Login</a>
</nav>
</header>

<div class="wrapper">
<div class="form-box login">

<h2>Login</h2>

{% if messages %}
<div class="messages">
{% for message in messages %}
<p class="message {% if message.tags %}{{ message.tags }}{% endif %}">{{ message }}</p>
{% endfor %}
</div>
{% endif %}

<form method="post">
{% csrf_token %}

<div class="input-box">
<label>Username *</label>
<input type="text" name="username" placeholder="Enter your username" required>
</div>

<div class="input-box" style="position:relative;">
<label>Password *</label>
<input type="password" id="password" name="password" placeholder="Enter your password" required>
<span class="toggle" onclick="togglePassword()">Show</span>
</div>

<div class="forgot-link">
<a href="{% url 'password_reset' %}">Forgot Password?</a>
</div>

<button type="submit" class="btn">Login</button>

<div class="login-register">
<p>Don't have an account? <a href="{% url 'register' %}">Register</a></p>
</div>

</form>

</div>
</div>

<script>
function togglePassword(){
    var field=document.getElementById("password");
    var toggle=document.querySelector(".toggle");

    if(field.type==="password"){
        field.type="text";
        toggle.innerText="Hide";
    }else{
        field.type="password";
        toggle.innerText="Show";
    }
}
</script>

</body>
</html>
