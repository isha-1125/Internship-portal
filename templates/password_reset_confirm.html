{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Set New Password</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
}

.wrapper{
    width:400px;
    padding:40px;
    border-radius:20px;
    backdrop-filter:blur(15px);
    background: rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:0 0 40px rgba(0,0,0,0.7);
}

h2{
    text-align:center;
    margin-bottom:25px;
    color:#e0e0ff;
}

.input-box{
    margin-bottom:25px;
}

.input-box label{
    font-size:14px;
    font-weight:600;
    color:#cfcfff;
}

.input-box input{
    width:100%;
    padding:10px;
    background:transparent;
    border:none;
    border-bottom:2px solid #aaa;
    color:#ffffff;
    font-size:15px;
    outline:none;
    margin-top:5px;
    transition:0.3s;
}

.input-box input:focus{
    border-bottom:2px solid #a855f7;
}

.password-field{
    position:relative;
}

.toggle{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:13px;
    color:#a855f7;
    font-weight:600;
}

.btn{
    width:100%;
    padding:10px;
    background:#6d28d9;
    color:white;
    border:none;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    background:#5b21b6;
    box-shadow:0 0 12px rgba(109,40,217,0.6);
}

.errorlist{
    color:#ff6b6b;
    font-size:13px;
    margin-top:5px;
}

.helptext{
    font-size:13px;
    margin-top:5px;
    color:#aaa;
}
</style>

</head>

<body>

<div class="wrapper">

<h2>Set New Password</h2>

<form method="post">
{% csrf_token %}

<div class="input-box">
<label>New Password</label>

<div class="password-field">
{{ form.new_password1 }}
<span class="toggle" onclick="togglePassword('id_new_password1', this)">Show</span>
</div>

{{ form.new_password1.errors }}

<div class="helptext">
Password must be at least 8 characters and not too common.
</div>

</div>

<div class="input-box">
<label>Confirm Password</label>

<div class="password-field">
{{ form.new_password2 }}
<span class="toggle" onclick="togglePassword('id_new_password2', this)">Show</span>
</div>

{{ form.new_password2.errors }}

</div>

<button type="submit" class="btn">Reset Password</button>

</form>

</div>

<script>

function togglePassword(id, element){

var field = document.getElementById(id);

if(field.type === "password"){
    field.type = "text";
    element.innerText = "Hide";
}
else{
    field.type = "password";
    element.innerText = "Show";
}

}

</script>

</body>
</html>
